<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Aplicație Taskuri</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 700px;
            margin: 40px auto;
            background: #f4f4f4;
        }

        h1 {
            text-align: center;
        }

        form, .task {
            background: white;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
        }

        input, textarea, select, button {
            width: 100%;
            margin-top: 8px;
            padding: 10px;
            box-sizing: border-box;
        }

        button {
            cursor: pointer;
        }

        .task.completed {
            opacity: 0.6;
            text-decoration: line-through;
        }

        .actions {
            display: flex;
            gap: 10px;
        }

        .actions button {
            width: auto;
            flex: 1;
        }
    </style>
</head>

<body>
    <h1>Task Manager</h1>

    <form id="taskForm">
        <input type="text" id="title" placeholder="Titlu task" required>
        <textarea id="description" placeholder="Descriere"></textarea>

        <select id="priority">
            <option value="0">Prioritate scăzută</option>
            <option value="1" selected>Prioritate normală</option>
            <option value="2">Prioritate ridicată</option>
        </select>

        <button type="submit">Adaugă task</button>
    </form>

    <div id="tasks"></div>

    <script>
        const api = "/api/todos";

        const form = document.getElementById("taskForm");
        const container = document.getElementById("tasks");

        async function incarcaTaskuri() {
            const response = await fetch(api);
            const taskuri = await response.json();

            container.innerHTML = "";

            taskuri.forEach(task => {
                const card = document.createElement("div");

                card.className = "task" + (task.isCompleted ? " completed" : "");

                card.innerHTML = `
                    <h3>${task.title}</h3>
                    <p>${task.description || ""}</p>
                    <p>Prioritate: ${afiseazaPrioritate(task.priority)}</p>
                    <p>Status: ${task.isCompleted ? "Finalizat" : "Activ"}</p>

                    <div class="actions">
                        <button onclick="schimbaStatus(${task.id})">
                            ${task.isCompleted ? "Reactivează" : "Finalizează"}
                        </button>

                        <button onclick="stergeTask(${task.id})">Șterge</button>
                    </div>
                `;

                container.appendChild(card);
            });
        }

        function afiseazaPrioritate(priority) {
            if (priority === 0) return "Scăzută";
            if (priority === 2) return "Ridicată";
            return "Normală";
        }

        form.addEventListener("submit", async (e) => {
            e.preventDefault();

            const taskNou = {
                title: document.getElementById("title").value,
                description: document.getElementById("description").value,
                priority: parseInt(document.getElementById("priority").value)
            };

            await fetch(api, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(taskNou)
            });

            form.reset();
            incarcaTaskuri();
        });

        async function schimbaStatus(id) {
            await fetch(`${api}/${id}/toggle`, {
                method: "PATCH"
            });

            incarcaTaskuri();
        }

        async function stergeTask(id) {
            if (!confirm("Sigur vrei să ștergi acest task?")) return;

            await fetch(`${api}/${id}`, {
                method: "DELETE"
            });

            incarcaTaskuri();
        }

        incarcaTaskuri();
    </script>
</body>
</html>
